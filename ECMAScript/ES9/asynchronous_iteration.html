<html>

<body>
  <script>
    let processos = [1, 2, 3, 4, 5]

    let iteracaoAssincrona = async () => {
      for (let processo of processos) {
        // Processamentos assíncronos
        await new Promise((resolve, reject) => {
          setTimeout(() => {
            console.log('Processamento assícrono')
            resolve()
          }, 2000)
        })
        console.log(processo)
      }

    }

    iteracaoAssincrona()

  </script>
</body>
