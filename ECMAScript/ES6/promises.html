<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Promisese</title>
  <link href="css/style.css" rel="stylesheet">
</head>

<body>
  <script>
    //-------------------------Parte 1------------------------
    //requisições http
    let resposta = {}
    let promessa = new Promise((resolve, reject) => {
      try {
        throw new Error('Opa, aconteceu um erro!')
        setTimeout(() => {
          resposta = {dados: {msg: 'Recuperamos os dados com sucesso!'}}
          resolve('Sucesso!')
        }, 3000)
      } catch (e) {
        setTimeout(() => {

          reject(e)
        }, 3000)
      }
    })

    console.log(promessa)

    setTimeout(() => {

      console.log(promessa)
      console.log(resposta)
    }, 5000)

    //-------------------------Parte 2------------------------
    let promessa2 = new Promise((resolve, reject) => {
      /*try{

      }catch(e){

      }*/

      //requisição para recuperar uma relação de posts dos usuários
      setTimeout(() => {
        //requisição foi realizada de algum modo
        let resposta_da_requisicao = {}

        //erro na requisição
        if (true) {
          resposta_da_requisicao = {
            codigo: 7788,
            erro: 'Erro ao recuperar os posts dos usuários'
          }
          reject(resposta_da_requisicao)
        }

        resposta_da_requisicao = {
          0: {
            id: 1, usuario_id: 1, posts: [
              {id: 1, post: 'Post 1'},
              {id: 2, post: 'Post 2'},
            ]
          },
          1: {
            id: 2, usuario_id: 2, posts: [
              {id: 1, post: 'Post 1'},
              {id: 2, post: 'Post 2'},
            ]
          },
          2: {
            id: 3, usuario_id: 3, posts: [
              {id: 1, post: 'Post 1'},
              {id: 2, post: 'Post 2'},
            ]
          },
        }

        resolve(resposta_da_requisicao)
      }, 4000)
    }).then(dados => {
      console.log('Operação Sequencial: '.dados)
      let promessa3 = new Promise((resolve, reject) => {
        //requisição para recuperar uma relação de usuários
        setTimeout(() => {
          //requisição foi realizada de algum modo
          let resposta_da_requisicao = {}

          //erro na requisição
          if (true) {
            resposta_da_requisicao = {
              codigo: 1050,
              erro: 'Falha de autorização'
            }
            reject(resposta_da_requisicao)
          }

          resposta_da_requisicao = {
            0: {id: 1, nome: 'João'},
            1: {id: 2, nome: 'José'},
            2: {id: 3, nome: 'Maria'},
          }

          resolve(resposta_da_requisicao)
        }, 4000)
      }).then(dados => {
        console.log(dados)
      }).catch(erro = {

      })

      return 'Parâmetro 1 para o then 2'
    }).then(param => {
      console.log('Then númenro 2', param)
    }).then(() => {
      console.log('Then númenro 3')
    }).then(() => {
      console.log('Then númenro 4')
    }).catch(erro => {
      console.log('Operação sequencial (Catch): ', erro)
    }).then(param => {
      console.log('Then númenro 5', param)
    }).then(param => {
      console.log('Then númenro 6', param)
    })
  </script>
</body>

</html>
